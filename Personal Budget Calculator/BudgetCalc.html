<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="BudgetCalc.css">
<body>

<h1>Monthly Budget Tracker</h1>

<p id="date"></p>

<div>
    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">
    <button id="addBtn">Add Expense</button>
</div>

<ul id="list"></ul>

<h2 id="total">Total: $0.00</h2>

<button id="clearBtn">Clear All</button>

<script src="BudgetCalc.js"></script>
</body>
</html>
