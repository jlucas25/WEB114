<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Average Calculator</title>
</head>
<body>

<header>
    <h1>JavaScript Functions Assignment</h1>
</header>

<main>
    <section>
        <h2>Question</h2>
        <p><strong>1. What is the purpose of a function?</strong></p>
        <p>A function is used to group reusable code together so it can be executed whenever needed. It helps organize code, reduce repetition, and improve readability.</p>
    </section>
</main>

<script>
"use strict";

// =========================
// GLOBAL VARIABLES
// =========================
let entryCount = 0;
let totalGas = 0;

// =========================
// MAIN PROGRAM
// =========================

// Ask for user name
let username = prompt("Enter your name:");

// Validate name
if (username === null) {
    alert("You cancelled the name prompt.");
} else if (username.trim() === "") {
    alert("You must type a name.");
} else {

    // Call function
    let average = calcGasAvg();

    // Check if cancelled during gas entry
    if (average === null) {
        alert("You cancelled entering gas totals.");
    } else {

        let message = "";
        let entryMessage = "";

        // Output results
        if (entryCount === 0) {
            alert("No gas totals were entered.");
        } else {
            if (entryCount === 1) {
                message = username + "'s gas total is $" + totalGas.toFixed(2);
            } else {
                message = username + "'s average weekly gas bill is $" + average.toFixed(2);
            }
            alert(message);
        }

        // Entry count message
        if (entryCount === 0) {
            entryMessage = "No gas totals were entered.";
        } else if (entryCount === 1) {
            entryMessage = "You entered 1 gas total.";
        } else {
            entryMessage = "You entered " + entryCount + " gas totals.";
        }

        alert(entryMessage);
    }
}

// =========================
// FUNCTION: CalcGasAvg
// =========================
function calcGasAvg() {

    let input;

    // First prompt
    input = prompt("Enter your first week's gas total. Enter -1 when you are done.");

    // Cancel check
    if (input === null) {
        return null;
    }

    // Convert to number
    let weeklyGas = parseFloat(input);

    // Loop
    while (weeklyGas !== -1) {

        // Validate number
        if (isNaN(weeklyGas)) {
            alert("Please enter a valid number.");

            input = prompt("Enter your first week's gas total. Enter -1 when you are done.");
            if (input === null) {
                return null;
            }

            weeklyGas = parseFloat(input);
            continue;
        }

        // Add and count
        totalGas += weeklyGas;
        entryCount++;

        // Next prompt
        input = prompt("Enter your next week's gas total. Enter -1 when you are done.");

        if (input === null) {
            return null;
        }

        weeklyGas = parseFloat(input);
    }

    // Calculate average
    let average;
    if (entryCount > 0) {
        average = totalGas / entryCount;
    } else {
        average = 0;
    }

    return average;
}

</script>

</body>
</html>
